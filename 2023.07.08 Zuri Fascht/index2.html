	<script>

		$jA(window).on('thumbsView', function (event){
			var pages = jAController.getPages();

			var dropPages = $jA(".dropPages");

			dropPages.append("<li class='active'><a href='index.html'>Home</a></li>");

			for(var i = 0; i < pages.length; i++){
				dropPages.append("<li><a href=" + pages[i].path + ">" + pages[i].name +"</a></li>");
			}

			$jA(window).on('clearView', function (event) {
				dropPages.empty();
			});

		});

		// print navigation path
		$jA(window).on('thumbsView', function (event){
			var currPath = jAController.getCurrPath();
			var albumTitle = jAGlobals.albumTitle;
			var path = $jA(".fh5co-path");
			var div = "";

			path.empty(); // empty path 

			while (albumTitle != ""){

				var temp = currPath.substring(0, currPath.length - 1);
				var dir = temp.substring(temp.lastIndexOf("/") + 1, temp.length);
				if(currPath == ""){
					dir = albumTitle;
					albumTitle = "";
				} 

				var obj = $jA("<a> " + dir.replace(/%20/g, " ") + " </a>" + div + " ");

				obj.on("click", {path: currPath}, function(event) {

			    	jAController.thumbsView(event.data.path);

			    	// recreate grid
			    	salvattore.init();
			    	hydrogen.magnifPopup();
				});

				path.prepend(obj);
				currPath = temp.substring(0, temp.lastIndexOf("/") + 1); // cut off last folder
				div = " > ";
			}
		});

		// print folders
		$jA(window).on('thumbsView', function (event){
			var folders = jAController.getFolders();
			var currPath = jAController.getCurrPath();

			var dropThumbs = $jA('.dropThumbs');

			for(var i = 0; i < folders.length; i++){

				var item = $jA("<div>", {"class": "item"});
				var animateBox = $jA("<div>", {"class": "animate-box bounceIn animated"});
				var a = $jA("<a>", {"class": "fh5co-folder fh5co-board-img"});
				var slide = $jA("<img src='" + folders[i].thumb + "'>");

				var desc = $jA("<div>", {"class": "fh5co-desc"});
				var title = $jA("<div>", {"class": "fh5co-title"});

				var name = folders[i].name == undefined ? "folder" : folders[i].name;
				var text = folders[i].comment == undefined ? "" : folders[i].comment;

				title.append(document.createTextNode(name));
				desc.append(document.createTextNode(text));

				var button = $jA("<div class='fh5co-button'><button>View folder</button></div>");

				a.append(slide);
				animateBox.append(a);
				item.append(animateBox);
				item.append(title);
				item.append(desc);
				item.append(button);
				dropThumbs.append(item);

				slide.on("click", {path: folders[i].path}, function(event) {

			    	jAController.thumbsView(currPath + event.data.path + "/");

			    	// recreate grid
			    	salvattore.init();
			    	hydrogen.magnifPopup();
				});

				button.on("click", {path: folders[i].path}, function(event) {

			    	jAController.thumbsView(currPath + event.data.path + "/");

			    	// recreate grid
			    	salvattore.init();
			    	hydrogen.magnifPopup();
				});
			}

			$jA(window).on('clearView', function (event) {
				dropThumbs.empty();
			});
		});

		// print thumbs
		$jA(window).on('thumbsView', function (event) {

			var slides = jAController.getSlides();
			var currPath = jAController.getCurrPath();

			var dropThumbs = $jA('.dropThumbs');

			for(var i = 0; i < slides.length; i++){

				var item = $jA("<div>", {"class": "item"});
				var animateBox = $jA("<div>", {"class": "animate-box bounceIn animated"});
				var a = $jA("<a>", {"class": "image-popup fh5co-board-img", "href": slides[i].slide});
				var slide = $jA("<img src='" + slides[i].slide + "'>");
				var desc = $jA("<div>", {"class": "fh5co-desc"});
				var text = slides[i].comment == undefined ? "" : slides[i].comment;
				desc.append(document.createTextNode(text));

				a.append(slide);
				animateBox.append(a);
				item.append(animateBox);
				item.append(desc);
				dropThumbs.append(item);
			}

			$jA(window).on('clearView', function (event) {
				dropThumbs.empty();
			});
		});

		jAController.thumbsView(""); // triggers start event with given current start path

	</script>
